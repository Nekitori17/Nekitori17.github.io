<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Nekitori17" />
    <meta name="description" content="Nekitori17's Official Website" />
    <meta
      name="keywords"
      content="Neki, Nekitori17, Neko, Hikari, Hakari, Nekitori Hakari"
    />
    <title>Nekitori17</title>
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/globalVariable.css" />
    <link id="color-palette" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="preload" href="/favicon.ico" as="image" />

    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100vw;
        height: 100%;
        overflow-x: hidden;
      }

      html {
        background: #050505;
      }

      body > main {
        visibility: hidden;
      }
      body > main.palette-ready {
        visibility: visible;
      }
    </style>
  </head>
  <body>
    <div id="boot-loading">
      <style>
        #boot-loading {
          position: absolute;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          overflow: hidden;
          z-index: 1000000000;
        }
        
        #canopy-above,
        #canopy-below 
        {
          position: absolute;
          width: 100%;
          height: 50%;
          background-color: black;
        }
        
        #canopy-above {
          top: 0;
        }
        
        #canopy-below {
          bottom: 0;
        }
        
        #parallelogram {
          position: absolute;
          top: 50%;
          left: 50%;
          width: 120%;
          height: 25%;
          transform: translate(-50%,-50%);
          clip-path: polygon(-97.5% 0%, -100% 100%, -2.5% 100%, 0% 0%);
          background: white;
        }

        #boot-loading.boot-phase-1 #parallelogram {
          animation: p-anim-1 1.4s cubic-bezier(0.8, 0, 0.2, 1) forwards;
        }

        #boot-loading.boot-hold #parallelogram {
          clip-path: polygon(2.5% 0%, 0% 100%, 97.5% 100%, 100% 0%);
        }
        #boot-loading.boot-hold #canopy-above {
          transform: translateY(-25%);
        }
        #boot-loading.boot-hold #canopy-below {
          transform: translateY(25%);
        }

        #boot-loading.boot-phase-2 #parallelogram {
          clip-path: polygon(2.5% 0%, 0% 100%, 97.5% 100%, 100% 0%);
          animation: p-anim-2 1.05s cubic-bezier(0.8, 0, 0.2, 1) forwards;
        }
        #boot-loading.boot-phase-2 #canopy-above {
          transform: translateY(-25%);
          animation: c-above-anim-2 1.05s cubic-bezier(0.8, 0, 0.2, 1) forwards;
        }
        #boot-loading.boot-phase-2 #canopy-below {
          transform: translateY(25%);
          animation: c-below-anim-2 1.05s cubic-bezier(0.8, 0, 0.2, 1) forwards;
        }
        
        div#content-box{
          position: absolute;
          top: 0;
          left: 17.5%;
          height: 100%;
          display: flex;
          flex-direction: column;
          justify-content: center;
        }

        #title{
          display: grid;
          grid-template-columns: 10% 1fr;
          grid-template-rows: auto auto;
          column-gap: 2%;
          align-items: center;
        }

        #title img{
          width: 100%;
          grid-column: 1;
          grid-row: 1;
        }

        #title-text{
          grid-column: 2;
          grid-row: 1;
          font-size: 2rem;
          font-weight: bold;
          font-family: 'Consolas', 'Courier New', monospace;
          white-space: nowrap;
        }

        #sub{
          grid-column: 2;
          grid-row: 2;
          font-size: 0.75rem;
          font-family: 'Inter', sans-serif;
          color: #00000073;
          letter-spacing: 0.2rem;
          text-transform: uppercase;
        }

        @keyframes p-anim-1 {
          0% { clip-path: polygon(-97.5% 0%, -100% 100%, -2.5% 100%, 0% 0%); }
          100% { clip-path: polygon(2.5% 0%, 0% 100%, 97.5% 100%, 100% 0%); }
        }
        @keyframes p-anim-2 {
          0% { clip-path: polygon(2.5% 0%, 0% 100%, 97.5% 100%, 100% 0%); }
          100% { clip-path: polygon(102.5% 0%, 100% 100%, 197.5% 100%, 200% 0%); }
        }
        @keyframes c-above-anim-2 {
          0% { transform: translateY(-25%); }
          100% { transform: translateY(-100%); }
        }
        @keyframes c-below-anim-2 {
          0% { transform: translateY(25%); }
          100% { transform: translateY(100%); }
        }
      </style>

      <div id="canopy-above"></div>
      <div id="canopy-below"></div>
      <div id="parallelogram">
        <div id="content-box">
          <div id="title">
            <img src="/favicon.ico" alt="logo"/>
            <span id="title-text">Just Random Guy</span>
            <div id="sub">Portfolio</div>
          </div>
        </div>
      </div>
    </div>

    <main class="app">
      <header class="header">
        <div class="title">
          <img src="/favicon.ico" alt="Nekitori17 logo" />
          <h1>Nekitori17</h1>
        </div>
        <nav class="navigation">
          <a id="home">.home(<i class="fa-solid fa-house-chimney"></i>)</a>
          <a id="works">.works(<i class="fa-solid fa-briefcase"></i>)</a>
          <a id="projects"
            >.projects(<i class="fa-solid fa-diagram-project"></i>)</a
          >
          <a id="about">.about(<i class="fa-solid fa-circle-info"></i>)</a>
        </nav>
      </header>
      <div class="container"></div>
      <script type="module" src="/bootstrap.js"></script>
    </main>
  </body>
</html>
